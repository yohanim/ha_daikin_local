sync_history:
  name: Sync energy history
  description: Corrects energy statistics using historical data from the Daikin unit (Today and Yesterday).
  fields:
    days_ago:
      name: Days ago
      description: Number of days back to sync (0 for Today, 1 for Yesterday).
      example: 0
      default: 0
      required: false
      selector:
        number:
          min: 0
          max: 1
          mode: box
    entity_id:
      name: Target sensor (optional)
      description: If set, only the config entry that owns this entity runs the service (must belong to this integration).
      required: false
      selector:
        entity:
          filter:
            domain: sensor
    insert_missing:
      name: Insert missing hourly rows
      description: "If false (default), only hours that already have long-term statistics are updated — avoids UNIQUE constraint errors with the recorder. Set true to backfill gaps (use sparingly)."
      required: false
      default: false
      selector:
        boolean:
    history_skip_extra_hours:
      name: Additional hours to skip
      description: "Optional override for this run only (integration options apply if omitted). Hours to ignore in addition to the current hour; total skip = 1 + this value. When set together with history_hours_to_correct (or alone), the window is not clamped to a minimum."
      required: false
      selector:
        number:
          mode: box
    history_hours_to_correct:
      name: Hours to correct
      description: "Optional override for this run only. Number of completed local hourly slots to correct before the skipped range. When set together with history_skip_extra_hours (or alone), values are not clamped."
      required: false
      selector:
        number:
          mode: box

sync_total_history:
  name: Sync total energy history
  description: Corrects the smoothed total/compressor energy history from the Daikin unit (targeted fix, use rarely).
  fields:
    days_ago:
      name: Days ago
      description: Number of days back to sync (0 for Today, 1 for Yesterday).
      example: 0
      default: 0
      required: false
      selector:
        number:
          min: 0
          max: 1
          mode: box
    entity_id:
      name: Target total entity
      description: Optional sensor entity_id to target a single total/compressor sensor.
      required: false
      selector:
        entity:
          filter:
            domain: sensor
    insert_missing:
      name: Insert missing hourly rows
      description: "Same as sync_history: default false updates only existing LTS hours; true inserts missing hours (may conflict with recorder compilation)."
      required: false
      default: false
      selector:
        boolean:
    history_skip_extra_hours:
      name: Additional hours to skip
      description: "Same as sync_history: optional override for this run; total skip = 1 + this value (current hour always counted). Unclamped when this or history_hours_to_correct is set."
      required: false
      selector:
        number:
          mode: box
    history_hours_to_correct:
      name: Hours to correct
      description: "Same as sync_history: optional override for how many completed hourly slots to correct. Unclamped when this or history_skip_extra_hours is set."
      required: false
      selector:
        number:
          mode: box
