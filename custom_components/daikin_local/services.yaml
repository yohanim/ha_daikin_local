sync_history:
  name: Sync energy history
  description: Corrects energy statistics using historical data from the Daikin unit (Today and Yesterday).
  fields:
    days_ago:
      name: Days ago
      description: Number of days back to sync (0 for Today, 1 for Yesterday).
      example: 0
      default: 0
      required: false
      selector:
        number:
          min: 0
          max: 1
          mode: box
    entity_id:
      name: Target sensor (optional)
      description: If set, only this Daikin energy sensor is corrected (must belong to this integration).
      required: false
      selector:
        entity:
          filter:
            domain: sensor
    insert_missing:
      name: Insert missing hourly rows
      description: "If false (default), only hours that already have long-term statistics are updated — avoids UNIQUE constraint errors with the recorder. Set true to backfill gaps (use sparingly)."
      required: false
      default: false
      selector:
        boolean:

sync_total_history:
  name: Sync total energy history
  description: Corrects the smoothed total/compressor energy history from the Daikin unit (targeted fix, use rarely).
  fields:
    days_ago:
      name: Days ago
      description: Number of days back to sync (0 for Today, 1 for Yesterday).
      example: 0
      default: 0
      required: false
      selector:
        number:
          min: 0
          max: 1
          mode: box
    entity_id:
      name: Target total entity
      description: Optional sensor entity_id to target a single total/compressor sensor.
      required: false
      selector:
        entity:
          filter:
            domain: sensor
    insert_missing:
      name: Insert missing hourly rows
      description: "Same as sync_history: default false updates only existing LTS hours; true inserts missing hours (may conflict with recorder compilation)."
      required: false
      default: false
      selector:
        boolean:
