[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore:.*asyncio.*:DeprecationWarning",
]
markers = [
    "local: no Home Assistant (run on Windows with requirements_local_tests.txt)",
    "requires_ha: needs homeassistant + pytest-homeassistant-custom-component",
]

[tool.ruff]
target-version = "py314"
src = ["custom_components", "tests"]
